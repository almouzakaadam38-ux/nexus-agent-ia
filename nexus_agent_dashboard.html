<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Nexus Agent IA - Dashboard</title>
    <style>
        body { background: #0a0a0f; color: #e8e8f0; font-family: sans-serif; margin: 0; text-align: center; }
        .navbar { background: #141422; padding: 15px; display: flex; justify-content: space-around; border-bottom: 1px solid #6c47ff; }
        .btn-nav { background: transparent; border: 1px solid #6c47ff; color: #6c47ff; padding: 5px 15px; border-radius: 5px; cursor: pointer; }
        .container { padding: 50px; }
        .card { background: #141422; padding: 30px; border-radius: 15px; border: 1px solid rgba(255,255,255,0.1); display: inline-block; width: 350px; }
        .btn-main { background: #6c47ff; color: white; border: none; padding: 12px; width: 100%; border-radius: 5px; cursor: pointer; margin-top: 20px; font-weight: bold; }
        .payment { margin-top: 25px; text-align: left; background: rgba(0,0,0,0.3); padding: 15px; border-radius: 10px; }
        .bank { color: #10b981; font-weight: bold; border-top: 1px solid #333; margin-top: 10px; padding-top: 10px; }
    </style>
</head>
<body>
    <div class="navbar">
        <div style="font-weight:bold; color:#6c47ff;">NEXUS IA</div>
        <div>
            <button class="btn-nav" onclick="alert('Page de connexion')">Se connecter</button>
            <button class="btn-nav" onclick="alert('Page d\'inscription')">S'inscrire</button>
        </div>
    </div>
    <div class="container">
        <div class="card">
            <h1>Nexus Command</h1>
            <p>Monétisation & Stratégie</p>
            <button class="btn-main" onclick="alert('Connectez-vous pour voir vos 490k vues')">Lancer la recherche</button>
            <div class="payment">
                <div style="color:#6c47ff; font-size:12px; margin-bottom:10px;">PAIEMENTS ACCEPTÉS</div>
                <div>Moov : +235 93643188</div>
                <div>Airtel : +235 64107740</div>
                <div class="bank">✔ Compte Bancaire / Visa : Actif</div>
            </div>
        </div>
    </div>
</body>
</html>
