<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus Command - Pro</title>
    <style>
        body { background: #0a0a0f; color: #e8e8f0; font-family: sans-serif; margin: 0; text-align: center; }
        .navbar { background: #141422; padding: 15px; display: flex; justify-content: space-between; border-bottom: 2px solid #6c47ff; }
        .container { padding: 40px 20px; }
        .card { background: #141422; padding: 30px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.1); display: inline-block; max-width: 450px; width: 100%; }
        
        .btn-activate { background: #10b981; color: white; border: none; padding: 18px; width: 100%; border-radius: 10px; cursor: pointer; font-weight: bold; margin-top: 20px; }
        
        /* Barre de chargement */
        #loader { display: none; margin-top: 20px; }
        .progress-bar { background: #333; height: 10px; border-radius: 5px; overflow: hidden; }
        .progress-fill { background: #6c47ff; height: 100%; width: 0%; transition: width 3s; }

        /* Formulaire de transaction */
        #transactionBox { display: none; margin-top: 20px; background: rgba(0,0,0,0.4); padding: 15px; border-radius: 10px; border: 1px dashed #6c47ff; }
        input { width: 90%; padding: 10px; margin-top: 10px; border-radius: 5px; border: 1px solid #333; background: #000; color: white; }
    </style>
</head>
<body>

    <div class="navbar">
        <div style="font-weight:bold; color:#6c47ff;">NEXUS COMMAND</div>
        <div id="status" style="color:#10b981;">● Connecté</div>
    </div>

    <div class="container">
        <div class="card">
            <h2 id="title">Tableau de Bord</h2>
            <div id="stats">
                <p>Vues : <strong>0</strong> | Revenus : <strong>0.00$</strong></p>
                <div style="background:rgba(255,0,0,0.1); color:#ff4d4d; padding:10px; border-radius:5px; font-size:13px;">Compte Non Activé</div>
            </div>

            <button id="btnMain" class="btn-activate" onclick="lancerVerif()">ACTIVER AVEC MOOV / AIRTEL / BANQUE</button>

            <div id="loader">
                <p>Connexion au réseau bancaire...</p>
                <div class="progress-bar"><div id="fill" class="progress-fill"></div></div>
            </div>

            <div id="transactionBox">
                <p style="font-size:14px;">Entrez l'ID de transaction ou le numéro de virement :</p>
                <input type="text" id="txId" placeholder="Ex: TXN-994821">
                <button class="btn-activate" style="padding:10px;" onclick="final()">Valider la transaction</button>
            </div>

            <div style="margin-top:20px; text-align:left; font-size:13px;">
                <p>Moov : +235 93643188</p>
                <p>Airtel : +235 64107740</p>
                <p style="color:#10b981;">Banque : Virement disponible</p>
            </div>
        </div>
    </div>

    <script>
        function lancerVerif() {
            document.getElementById('btnMain').style.display = 'none';
            document.getElementById('loader').style.display = 'block';
            setTimeout(() => { document.getElementById('fill').style.width = '100%'; }, 100);
            
            setTimeout(() => {
                document.getElementById('loader').style.display = 'none';
                document.getElementById('transactionBox').style.display = 'block';
            }, 3500);
        }

        function final() {
            alert("Vérification en cours... Un agent Nexus va valider votre ID sous 15 minutes. Vous recevrez une notification sur votre compte.");
            location.reload(); // Recommence pour le test
        }
    </script>
</body>
</html>
