<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus Agent IA - Dashboard Pro</title>
    <style>
        body { background: #0a0a0f; color: #e8e8f0; font-family: 'Segoe UI', sans-serif; margin: 0; text-align: center; }
        .navbar { background: #141422; padding: 15px 30px; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #6c47ff; }
        .logo { font-weight: bold; color: #6c47ff; font-size: 1.4rem; }
        .btn-nav { background: transparent; border: 1px solid #6c47ff; color: #6c47ff; padding: 8px 18px; border-radius: 5px; cursor: pointer; font-weight: bold; }
        
        .container { padding: 60px 20px; }
        .card { background: #141422; padding: 40px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.1); display: inline-block; max-width: 400px; width: 100%; box-shadow: 0 15px 35px rgba(0,0,0,0.6); }
        
        h1 { margin: 0 0 10px 0; font-size: 2rem; }
        .btn-main { background: #6c47ff; color: white; border: none; padding: 15px; width: 100%; border-radius: 10px; cursor: pointer; margin-top: 25px; font-weight: bold; font-size: 1rem; }
        
        .payment { margin-top: 30px; text-align: left; background: rgba(255,255,255,0.03); padding: 20px; border-radius: 12px; }
        .method { margin-bottom: 8px; font-size: 0.9rem; }
        .bank { color: #10b981; font-weight: bold; border-top: 1px solid #333; margin-top: 15px; padding-top: 10px; display: flex; align-items: center; gap: 8px; }

        /* Fenêtre Inscription (Modal) */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); align-items: center; justify-content: center; z-index: 100; }
        .modal-content { background: #1c1c2e; padding: 30px; border-radius: 15px; width: 320px; text-align: left; border: 1px solid #6c47ff; }
        .modal-content h2 { margin-top: 0; color: #6c47ff; }
        input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: 1px solid #333; background: #0a0a0f; color: white; box-sizing: border-box; }
        .btn-send { background: #10b981; color: white; border: none; padding: 12px; width: 100%; border-radius: 8px; font-weight: bold; cursor: pointer; margin-top: 10px; }
    </style>
</head>
<body>

    <div class="navbar">
        <div class="logo">NEXUS COMMAND</div>
        <button class="btn-nav" onclick="ouvrirInscription()">S'inscrire</button>
    </div>

    <div class="container">
        <div class="card">
            <h1>Nexus IA</h1>
            <p style="color: #94a3b8;">Boostez votre monétisation et vos vues maintenant.</p>
            
            <button class="btn-main" onclick="ouvrirInscription()">Lancer une recherche d'audience</button>
            
            <div class="payment">
                <div style="color:#6c47ff; font-size:0.8rem; font-weight:bold; margin-bottom:12px; letter-spacing:1px;">PAIEMENTS SÉCURISÉS</div>
                <div class="method">🟠 Moov : <strong>+235 93643188</strong></div>
                <div class="method">🔵 Airtel : <strong>+235 64107740</strong></div>
                <div class="bank">🟢 Compte Bancaire & Carte Visa : Actif</div>
            </div>
        </div>
    </div>

    <div id="modalInscription" class="modal">
        <div class="modal-content">
            <h2>Créer un compte</h2>
            <p style="font-size: 0.8rem; color: #94a3b8;">Inscrivez-vous pour accéder à vos revenus.</p>
            <label>Nom complet</label>
            <input type="text" placeholder="Ex: Jean Paul">
            <label>Email</label>
            <input type="email" placeholder="votre@email.com">
            <label>Mot de passe</label>
            <input type="password" placeholder="••••••••">
            <button class="btn-send" onclick="valider()">Créer mon accès</button>
            <button onclick="fermerInscription()" style="background:none; border:none; color:#666; width:100%; margin-top:10px; cursor:pointer;">Annuler</button>
        </div>
    </div>

    <script>
        function ouvrirInscription() {
            document.getElementById('modalInscription').style.display = 'flex';
        }
        function fermerInscription() {
            document.getElementById('modalInscription').style.display = 'none';
        }
        function valider() {
            alert('Félicitations ! Compte créé. Veuillez procéder au paiement pour activer vos services.');
            fermerInscription();
        }
    </script>

</body>
</html>
